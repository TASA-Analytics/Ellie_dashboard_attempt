<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Silver Model — TASA EFX</title>
<style>
:root {
  --navy:#0d0f1a; --navy2:#121522; --panel:#0f1220;
  --gold:#F5A623; --white:#e8ecff;
  --s1:#e8534a; --s2:#f0a500; --s3:#4a90d9;
  --dim:rgba(255,255,255,0.40); --bdr:rgba(255,255,255,0.10);
  --mid:#4a5070;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans','Segoe UI',Arial,sans-serif;background:var(--navy);color:var(--white);min-height:100vh;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:13px 32px;
    background:rgba(13,15,26,0.97);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--white);}
.nav-logo img{height:36px;border-radius:5px;}
.logo-text{font-size:15px;font-weight:800;letter-spacing:-.01em;}
.logo-text em{color:var(--gold);font-style:normal;}
.nav-links{display:flex;gap:22px;}
.nav-links a{color:var(--dim);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s;}
.nav-links a:hover{color:var(--gold);}
.nav-links a.active{color:var(--white);border-bottom:2px solid var(--gold);padding-bottom:2px;}

/* PAGE HEADER */
.ph{background:var(--navy2);border:1px solid var(--bdr);border-radius:12px;
    padding:20px 24px 16px;margin:20px 24px 0;}
.ph-title{font-size:22px;font-weight:800;color:var(--white);letter-spacing:-0.02em;margin-bottom:4px;}
.ph-sub{font-size:12px;color:var(--mid);}

/* TABS */
.tabs{display:flex;padding:0 24px;border-bottom:1px solid var(--bdr);margin-top:16px;}
.tb{padding:12px 20px;background:none;border:none;border-bottom:2.5px solid transparent;
    color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;
    font-family:inherit;transition:color .2s,border-color .2s;margin-bottom:-1px;}
.tb:hover{color:var(--white);} .tb.on{color:var(--white);border-bottom-color:var(--gold);}
.pane{display:none;} .pane.on{display:block;}

/* CONTROLS — matches the Python widget layout exactly */
.controls{background:var(--navy2);border:1px solid var(--bdr);border-radius:10px;
           padding:16px 20px;margin:16px 24px;display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start;}
.ctrl-group{display:flex;flex-direction:column;gap:6px;}
.ctrl-label{font-size:10px;font-weight:700;letter-spacing:0.12em;color:var(--s3);text-transform:uppercase;}

/* ISIC dropdown — wide */
#f-isic{min-width:480px;}

/* Multi-select boxes — match Python widget look */
select{background:var(--navy);color:var(--white);border:1.5px solid var(--bdr);
  border-radius:8px;padding:4px 8px;font-family:inherit;font-size:12px;
  appearance:none;cursor:pointer;transition:border-color .2s;}
select:focus{outline:none;border-color:var(--white);}
select option{background:var(--navy2);color:var(--white);}
select option:checked{background:#1e2a4a;color:#7bb8f5;}

#f-country{width:220px;height:160px;}
#f-year{width:130px;height:72px;}

.ctrl-hint{font-size:11px;color:#3a4060;margin-top:4px;}

/* CHART AREA */
.chart-area{margin:0 24px 24px;background:var(--navy2);border:1px solid var(--bdr);
             border-radius:10px;overflow:hidden;min-height:200px;}

/* SVG chart */
.chart-scroll{overflow-x:auto;width:100%;}
svg.chart{display:block;overflow:visible;}

/* Empty / loading states */
.state-msg{display:flex;align-items:center;justify-content:center;min-height:300px;
  padding:40px;text-align:center;color:var(--mid);font-size:14px;
  border-radius:10px;border:1px dashed var(--bdr);}
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);
  border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Raw table */
.raw-area{margin:0 24px 24px;}
.tc{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
.tc input{background:rgba(255,255,255,0.07);border:1.5px solid var(--bdr);
  color:var(--white);border-radius:7px;padding:7px 11px;font-size:13px;font-family:inherit;width:260px;}
.tc input::placeholder{color:var(--mid);}
.tc input:focus{outline:none;border-color:var(--gold);}
.rc{font-size:12px;color:var(--dim);margin-left:auto;}
.tw{overflow-x:auto;border-radius:9px;border:1px solid var(--bdr);}
table.raw{width:100%;border-collapse:collapse;font-size:12px;}
table.raw thead{background:rgba(255,255,255,0.04);}
table.raw th{padding:10px 13px;text-align:left;font-size:10px;text-transform:uppercase;
  letter-spacing:.10em;color:#6B88B4;border-bottom:1px solid var(--bdr);white-space:nowrap;font-weight:600;}
table.raw td{padding:9px 13px;border-bottom:1px solid rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.78);font-variant-numeric:tabular-nums;}
table.raw tr:last-child td{border-bottom:none;}
table.raw tbody tr:hover td{background:rgba(255,255,255,0.025);}
.cs1{color:var(--s1);font-weight:600;} .cs2{color:var(--s2);font-weight:600;} .cs3{color:var(--s3);font-weight:600;}

footer{border-top:1px solid var(--bdr);padding:20px 24px;display:flex;justify-content:space-between;
  align-items:center;color:rgba(255,255,255,0.22);font-size:12px;margin-top:20px;}

@media(max-width:700px){
  nav{padding:12px 14px;} .ph,.tabs,.controls,.chart-area,.raw-area{margin-left:12px;margin-right:12px;}
  #f-isic{min-width:260px;} #f-country{width:160px;} .controls{gap:14px;}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <!-- LOGO: replace with <img src="assets/logo.jpeg" alt="TASA EFX"> -->
    <div class="logo-text">TASA <em>EFX</em></div>
  </a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="silver.html" class="active">Silver</a>
    <a href="platinum.html">Platinum</a>
    <a href="rlca.html">rLCA</a>
  </div>
</nav>

<div class="ph">
  <p class="ph-title">Scope Emissions · Country Sector View</p>
  <!-- EDIT: update subtitle to match your product messaging -->
  <p class="ph-sub">Scope 1 · 2 · 3 emissions intensity by ISIC sector, country, and year</p>
</div>

<div class="tabs">
  <button class="tb on" onclick="switchTab('dash',this)">📊 Dashboard</button>
  <button class="tb"    onclick="switchTab('raw',this)">📋 Raw Data</button>
</div>

<!-- DASHBOARD TAB -->
<div id="pane-dash" class="pane on">

  <!-- Controls — 1 dropdown + 2 multi-selects, exactly like the Python widgets -->
  <div class="controls">
    <div class="ctrl-group" style="flex:1;min-width:260px;">
      <div class="ctrl-label">ISIC Sector</div>
      <select id="f-isic" onchange="render()"><option value="">Loading…</option></select>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Countries</div>
      <select id="f-country" multiple onchange="render()"></select>
      <div class="ctrl-hint">Hold Ctrl / Cmd to select multiple</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Years</div>
      <select id="f-year" multiple onchange="render()">
        <option value="2020" selected>2020</option>
        <option value="2023" selected>2023</option>
        <option value="2024" selected>2024</option>
      </select>
    </div>
  </div>

  <div class="chart-area" id="chart-area">
    <div class="state-msg"><div class="spin"></div>&nbsp; Loading data…</div>
  </div>

</div>

<!-- RAW DATA TAB -->
<div id="pane-raw" class="pane">
  <div class="raw-area" style="padding-top:20px;">
    <div class="tc">
      <input type="text" id="ts" placeholder="Search sector or country…" oninput="renderTable()">
      <span class="rc" id="rc"></span>
    </div>
    <div class="tw">
      <table class="raw"><thead id="th"></thead>
      <tbody id="tb"><tr><td style="padding:36px;text-align:center;color:var(--dim)">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  <!-- EDIT: update copyright -->
  <span>© 2025 TASA EFX. All rights reserved.</span>
  <span>Silver Model · kgCO₂e / USD</span>
</footer>

<script>
// ══════════════════════════════════════════
// CONFIG
const CSV_URL = 'TASA_Silver_NAICS_ISIC.csv';
// ══════════════════════════════════════════

const SCOPE_COLORS = {'Scope 1':'#e8534a','Scope 2':'#f0a500','Scope 3':'#4a90d9'};
const GAP_SECTOR   = 0.6;   // gap between country-sectors within a country (matches Python)
const GAP_COUNTRY  = 1.8;   // gap between countries (matches Python)
const BAR_W        = 28;    // pixel width per bar unit
const BAR_GAP      = 8;     // pixel gap between bar units
const YEARS_AVAIL  = ['2020','2023','2024'];

let allData = [];   // raw wide rows from CSV
let dfLong  = [];   // melted to long form: {isic, country, countrySector, year, scope, value}

function parseCSV(text){
  const lines = text.trim().split('\n');
  const hdr   = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l=>l.trim()).map(ln=>{
    const vals = ln.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    const o={}; hdr.forEach((h,i)=>o[h]=vals[i]??''); return o;
  });
}

// Melt wide CSV into long form — exact equivalent of df_long in Python
function toLong(rows){
  const numCols = [
    'Base Year Total Emissions Intensity',
    'Base Year Scope 1','Base Year Scope 2','Base Year Scope 3',
    '2020 Total Emissions Intensity',
    '2020 Scope 1','2020 Scope 2','2020 Scope 3',
    '2023 Total Emissions Intensity',
    '2023 Scope 1','2023 Scope 2','2023 Scope 3',
    '2024 Total Emissions Intensity',
    '2024 Scope 1','2024 Scope 2','2024 Scope 3',
  ];
  const long = [];
  rows.forEach(row=>{
    numCols.forEach(col=>{
      const val = parseFloat(row[col]);
      if(isNaN(val)) return;
      // parse year and scope from column name
      let year, scope;
      if(col.startsWith('Base Year')){
        year  = 'Base Year';
        scope = col.replace('Base Year ','');
      } else {
        const sp = col.indexOf(' ');
        year  = col.slice(0, sp);
        scope = col.slice(sp+1);
      }
      if(!scope.startsWith('Scope')) return; // skip Total rows — we sum the 3 scopes ourselves
      long.push({
        isic:          row['ISIC Rev. 4 Title']   ||'',
        country:       row['Country Name']         ||'',
        countrySector: row['Country Sector']       ||`${row['Country Name']} — ${row['ISIC Rev. 4 Title']}`,
        year, scope, value: val
      });
    });
  });
  return long;
}

function switchTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pane-'+id).classList.add('on');
  btn.classList.add('on');
  if(id==='raw') renderTable();
}

function getSelected(id){ return [...document.getElementById(id).selectedOptions].map(o=>o.value); }

function populateControls(){
  const isics     = [...new Set(dfLong.map(r=>r.isic).filter(Boolean))].sort();
  const countries = [...new Set(dfLong.map(r=>r.country).filter(Boolean))].sort();

  const iSel = document.getElementById('f-isic');
  iSel.innerHTML = '';
  isics.forEach(s=>iSel.add(new Option(s,s)));

  const cSel = document.getElementById('f-country');
  cSel.innerHTML = '';
  countries.forEach(c=>{
    const o = new Option(c,c);
    // Default select first 3 countries, like Python's value=["Australia","Brazil","Germany"]
    if(['Australia','Brazil','Germany'].includes(c)) o.selected = true;
    cSel.add(o);
  });
}

// ── Main render — replicates build_chart() from Python exactly ──
function render(){
  const isic      = document.getElementById('f-isic').value;
  const countries = getSelected('f-country');
  const years     = getSelected('f-year');
  const area      = document.getElementById('chart-area');

  if(!isic || !countries.length || !years.length){
    area.innerHTML = `<div class="state-msg">Select a sector, at least one country, and at least one year.</div>`;
    return;
  }

  // Filter — matches Python: df_long[(isic) & (country in countries) & (year in years)]
  const filtered = dfLong.filter(r=>
    r.isic===isic && countries.includes(r.country) && years.includes(r.year)
  );

  if(!filtered.length){
    area.innerHTML = `<div class="state-msg">No data for this selection — try different countries or ISIC sector.</div>`;
    return;
  }

  // Aggregate: groupby [country, countrySector, year, scope] → sum value
  // Then pivot scope → columns (Scope 1, Scope 2, Scope 3)
  const aggMap = {};
  filtered.forEach(r=>{
    const key = `${r.country}|||${r.countrySector}|||${r.year}`;
    if(!aggMap[key]) aggMap[key] = {country:r.country, countrySector:r.countrySector, year:r.year, 'Scope 1':0,'Scope 2':0,'Scope 3':0};
    aggMap[key][r.scope] += r.value;
  });
  let agg = Object.values(aggMap);
  agg.forEach(r=>r.Total = r['Scope 1']+r['Scope 2']+r['Scope 3']);
  agg.sort((a,b)=>a.country.localeCompare(b.country)||a.countrySector.localeCompare(b.countrySector)||a.year.localeCompare(b.year));

  // ── Build x positions — exact replica of Python logic ──
  // Each bar gets a numeric x position.
  // Within a Country Sector: bars are spaced 1 apart (one per year).
  // Between Country Sectors: GAP_SECTOR added.
  // Between Countries: GAP_COUNTRY added.
  const xPosMap   = {};   // key → x position
  const tickVals  = [];   // x positions for tick marks
  const tickTexts = [];   // year labels for ticks
  const sectorLabelPos  = {};  // (country,countrySector) → midpoint x
  const countryLabelPos = {};  // country → midpoint x

  let pos = 0;

  countries.forEach(country=>{
    const countryRows = agg.filter(r=>r.country===country);
    if(!countryRows.length) return;

    const countryStart = pos;
    const secs = [...new Set(countryRows.map(r=>r.countrySector))].sort();

    secs.forEach(sec=>{
      const secStart = pos;
      const secRows = countryRows.filter(r=>r.countrySector===sec)
        .sort((a,b)=>a.year.localeCompare(b.year));
      secRows.forEach(row=>{
        const key = `${row.country}|||${row.countrySector}|||${row.year}`;
        xPosMap[key] = pos;
        tickVals.push(pos);
        tickTexts.push(row.year);
        pos += 1;
      });
      sectorLabelPos[`${country}|||${sec}`] = (secStart + pos - 1) / 2;
      pos += GAP_SECTOR;
    });

    countryLabelPos[country] = (countryStart + pos - GAP_SECTOR) / 2;
    pos += GAP_COUNTRY;
  });

  // Map x positions back onto agg rows
  agg.forEach(r=>{
    const key = `${r.country}|||${r.countrySector}|||${r.year}`;
    r.xPos = xPosMap[key] ?? null;
  });
  agg = agg.filter(r=>r.xPos !== null);

  if(!agg.length){
    area.innerHTML = `<div class="state-msg">No data for this selection.</div>`;
    return;
  }

  const maxX   = Math.max(...agg.map(r=>r.xPos));
  const maxY   = Math.max(...agg.map(r=>r.Total)) * 1.08 || 1;

  // ── SVG dimensions ──
  // Map numeric x-position to pixels
  const LPAD=64, RPAD=24, TPAD=52, BPAD=180;
  const UNIT = BAR_W + BAR_GAP; // pixels per x-unit
  const chartW = LPAD + RPAD + (maxX + 1) * UNIT;
  const chartH = 520;
  const plotH  = chartH - TPAD - BPAD;
  const plotW  = chartW - LPAD - RPAD;

  const px = x => LPAD + x * UNIT + UNIT/2 - BAR_W/2;  // left edge of bar at x-pos
  const py = v => TPAD + plotH - (v / maxY) * plotH;    // y pixel for value v

  // Y grid lines
  const yTicks = 5;
  let gridLines = '';
  for(let i=0;i<=yTicks;i++){
    const v   = (maxY/yTicks)*i;
    const y   = py(v);
    const lbl = v>=1000 ? (v/1000).toFixed(1)+'k' : v.toFixed(v<10?2:1);
    gridLines += `<line x1="${LPAD}" y1="${y.toFixed(1)}" x2="${chartW-RPAD}" y2="${y.toFixed(1)}"
      stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
      <text x="${LPAD-6}" y="${y.toFixed(1)}" dy="4" text-anchor="end"
        fill="#5a6080" font-size="10" font-family="DM Sans,Segoe UI,sans-serif">${lbl}</text>`;
  }

  // Y axis label
  const yAxisLabel = `<text transform="rotate(-90)" x="${-(TPAD+plotH/2)}" y="14"
    text-anchor="middle" fill="#4a5070" font-size="11" font-family="DM Sans,Segoe UI,sans-serif">Emissions Intensity</text>`;

  // ISIC label at top (matches Python annotation at y=1.07)
  const isicLabel = `<text x="${chartW/2}" y="${TPAD-28}" text-anchor="middle"
    fill="#5a6080" font-size="11" font-family="DM Sans,Segoe UI,sans-serif">
    ▸  ${escSVG(isic)}</text>`;

  // Legend
  const legendY = TPAD - 12;
  let legend = '';
  ['Scope 1','Scope 2','Scope 3'].forEach((sc,i)=>{
    const lx = LPAD + i*90;
    legend += `<rect x="${lx}" y="${legendY-8}" width="10" height="10" rx="2" fill="${SCOPE_COLORS[sc]}"/>
      <text x="${lx+14}" y="${legendY+1}" fill="#8a90a8" font-size="11" font-family="DM Sans,Segoe UI,sans-serif">${sc}</text>`;
  });

  // Bars — one <rect> per scope per row, stacked
  let bars = '';
  ['Scope 1','Scope 2','Scope 3'].forEach(scope=>{
    agg.forEach(row=>{
      const val   = row[scope];
      if(val<=0) return;
      const below = scope==='Scope 1' ? 0
                  : scope==='Scope 2' ? row['Scope 1']
                  : row['Scope 1']+row['Scope 2'];
      const bx    = px(row.xPos).toFixed(1);
      const by    = py(below+val).toFixed(1);
      const bh    = Math.max(1, ((val/maxY)*plotH)).toFixed(1);
      const bw    = BAR_W;
      // Tooltip data embedded as data-* attributes
      bars += `<rect x="${bx}" y="${by}" width="${bw}" height="${bh}"
        fill="${SCOPE_COLORS[scope]}" opacity="0.92" rx="1"
        data-country="${escSVG(row.country)}"
        data-sector="${escSVG(row.countrySector)}"
        data-year="${row.year}"
        data-total="${row.Total.toFixed(1)}"
        data-s1="${row['Scope 1'].toFixed(1)}"
        data-s2="${row['Scope 2'].toFixed(1)}"
        data-s3="${row['Scope 3'].toFixed(1)}"
        class="bar-rect"/>`;
    });
  });

  // X tick labels (year, below each bar)
  let xTicks = '';
  tickVals.forEach((xv,i)=>{
    const cx = (px(xv) + BAR_W/2).toFixed(1);
    xTicks += `<text x="${cx}" y="${(TPAD+plotH+14).toFixed(1)}" text-anchor="middle"
      fill="#5a6080" font-size="10" font-family="DM Sans,Segoe UI,sans-serif">${tickTexts[i]}</text>`;
  });

  // Country Sector labels (below year ticks) — matches Python annotation at y=-0.34
  let secLabels = '';
  Object.entries(sectorLabelPos).forEach(([key, midX])=>{
    const [,sec] = key.split('|||');
    const cx = (px(midX) + BAR_W/2).toFixed(1);
    const words = sec.split(/\s+/);
    // wrap to ~16 chars per line
    const lines = [];
    let cur='';
    words.forEach(w=>{
      if((cur+' '+w).trim().length>16 && cur){lines.push(cur);cur=w;}
      else cur=(cur+' '+w).trim();
    });
    if(cur) lines.push(cur);
    const ly = TPAD + plotH + 30;
    lines.forEach((ln,li)=>{
      secLabels += `<text x="${cx}" y="${(ly+li*13).toFixed(1)}" text-anchor="middle"
        fill="#5a6080" font-size="10" font-family="DM Sans,Segoe UI,sans-serif">${escSVG(ln)}</text>`;
    });
  });

  // Country labels (bottom) — matches Python annotation at y=-0.58
  let ctyLabels = '';
  Object.entries(countryLabelPos).forEach(([country, midX])=>{
    const cx = (px(midX) + BAR_W/2).toFixed(1);
    ctyLabels += `<text x="${cx}" y="${(TPAD+plotH+110).toFixed(1)}" text-anchor="middle"
      fill="#7bb8f5" font-size="13" font-weight="bold" font-family="DM Sans,Segoe UI,sans-serif">${escSVG(country)}</text>`;
  });

  // Country separator lines — matches Python add_shape dotted vertical
  let separators = '';
  const validCountries = countries.filter(c=>agg.some(r=>r.country===c));
  validCountries.slice(0,-1).forEach(country=>{
    const lastX = Math.max(...agg.filter(r=>r.country===country).map(r=>r.xPos));
    const sepX  = (px(lastX) + BAR_W + (GAP_SECTOR/2+GAP_COUNTRY/3)*UNIT).toFixed(1);
    separators += `<line x1="${sepX}" y1="${TPAD}" x2="${sepX}" y2="${(TPAD+plotH).toFixed(1)}"
      stroke="#2a3050" stroke-width="1" stroke-dasharray="4,3"/>`;
  });

  area.innerHTML = `
    <div class="chart-scroll">
      <svg class="chart" width="${chartW}" height="${chartH}"
           style="background:#0d0f1a;font-family:'DM Sans','Segoe UI',sans-serif;">
        ${gridLines}
        ${yAxisLabel}
        ${separators}
        ${bars}
        ${isicLabel}
        ${legend}
        ${xTicks}
        ${secLabels}
        ${ctyLabels}
      </svg>
    </div>
    <div id="tooltip" style="
      display:none;position:fixed;pointer-events:none;
      background:rgba(21,24,39,0.97);color:#e8ecff;
      padding:10px 14px;border-radius:8px;font-size:12px;
      border:1px solid #2e3249;line-height:1.7;z-index:9999;max-width:220px;
      font-family:'DM Sans','Segoe UI',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.4);">
    </div>`;

  // Tooltip interaction
  const tip = document.getElementById('tooltip');
  area.querySelectorAll('.bar-rect').forEach(rect=>{
    rect.addEventListener('mouseenter', e=>{
      const d = e.target.dataset;
      tip.innerHTML = `<b style="font-size:13px">${d.country}</b><br>
        <span style="color:#8a90a8">${d.sector} · ${d.year}</span><br><br>
        <b>Total: ${d.total}</b><br>
        <span style="color:#3a4060">──────────────</span><br>
        <span style="color:#e8534a">▮</span> Scope 1 &nbsp; ${d.s1}<br>
        <span style="color:#f0a500">▮</span> Scope 2 &nbsp; ${d.s2}<br>
        <span style="color:#4a90d9">▮</span> Scope 3 &nbsp; ${d.s3}`;
      tip.style.display='block';
    });
    rect.addEventListener('mousemove', e=>{
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-10)+'px';
    });
    rect.addEventListener('mouseleave',()=>tip.style.display='none');
  });
}

function escSVG(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Raw data table
function renderTable(){
  const q=(document.getElementById('ts')?.value||'').toLowerCase();
  const isic=document.getElementById('f-isic').value;
  const yr=YEARS_AVAIL[0];
  const cols=['ISIC Rev. 4 Title','Country Name','Country Sector',
    '2024 Total Emissions Intensity','2024 Scope 1','2024 Scope 2','2024 Scope 3',
    '2023 Total Emissions Intensity','2023 Scope 1','2023 Scope 2','2023 Scope 3',
    '2020 Scope 1','2020 Scope 2','2020 Scope 3'];
  const sc={'2024 Scope 1':'cs1','2024 Scope 2':'cs2','2024 Scope 3':'cs3',
            '2023 Scope 1':'cs1','2023 Scope 2':'cs2','2023 Scope 3':'cs3',
            '2020 Scope 1':'cs1','2020 Scope 2':'cs2','2020 Scope 3':'cs3'};
  const src = isic ? allData.filter(r=>r['ISIC Rev. 4 Title']===isic) : allData;
  const rows = src.filter(r=>!q||
    (r['ISIC Rev. 4 Title']||'').toLowerCase().includes(q)||
    (r['Country Name']||'').toLowerCase().includes(q)||
    (r['Country Sector']||'').toLowerCase().includes(q)
  ).slice(0,600);
  document.getElementById('rc').textContent=`${rows.length} of ${src.length} rows`;
  const visibleCols = cols.filter(c=>Object.keys(rows[0]||{}).includes(c));
  document.getElementById('th').innerHTML=`<tr>${visibleCols.map(c=>`<th>${c}</th>`).join('')}</tr>`;
  document.getElementById('tb').innerHTML=rows.map(r=>
    `<tr>${visibleCols.map(c=>`<td class="${sc[c]||''}">${r[c]||'—'}</td>`).join('')}</tr>`
  ).join('');
}

// Boot
(async()=>{
  try{
    const resp = await fetch(CSV_URL);
    if(!resp.ok) throw new Error('not found');
    allData = parseCSV(await resp.text());
    dfLong  = toLong(allData);
    populateControls();
    render();
  } catch(e){
    document.getElementById('chart-area').innerHTML=`
      <div class="state-msg">
        Could not load <strong>${CSV_URL}</strong>.<br>
        Make sure the file is in the root of your GitHub repo.
      </div>`;
  }
})();
